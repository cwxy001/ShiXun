<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能瞭望采集 - IOIQ System</title>
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; overflow:hidden; }

        /* 全局深色渐变背景 */
        .page-bg {
            width:100%; height:100vh;
            background: linear-gradient(170deg, #0a0e1a 0%, #0f1724 30%, #0b1120 60%, #090d18 100%);
            display:flex; flex-direction:column;
            position:relative; overflow:hidden;
        }
        /* 动态网格背景 */
        .grid-overlay {
            position:absolute; top:0; left:0; right:0; bottom:0;
            opacity:0.04; pointer-events:none;
            background-image:
                linear-gradient(rgba(56,189,248,0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.5) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        /* 光晕装饰 */
        .glow-1, .glow-2 {
            position:absolute; border-radius:50%; pointer-events:none;
            filter:blur(120px); opacity:0.08;
        }
        .glow-1 { width:500px; height:500px; background:#4a6cf7; top:-100px; left:-100px; }
        .glow-2 { width:400px; height:400px; background:#38bdf8; bottom:-80px; right:-80px; }

        /* 顶部栏 */
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 28px; flex-shrink:0; z-index:10;
            background:rgba(15,23,36,0.8); backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(56,189,248,0.08);
        }
        .top-bar .brand { font-size:16px; font-weight:700; color:#e2e8f0; letter-spacing:1px; display:flex; align-items:center; gap:10px; }
        .top-bar .brand i { color:#38bdf8; font-size:20px; }
        .top-bar .nav-links { display:flex; gap:20px; align-items:center; }
        .top-bar .nav-links a {
            color:#64748b; text-decoration:none; font-size:13px; font-weight:600;
            display:flex; align-items:center; gap:6px; transition:color 0.2s;
        }
        .top-bar .nav-links a:hover { color:#38bdf8; }
        .top-bar .nav-links a.active { color:#38bdf8; }

        /* 主体滚动区 */
        .main-scroll {
            flex:1; overflow-y:auto; overflow-x:hidden; padding:0 20px 40px; z-index:1;
        }

        /* 搜索区域 */
        .search-section {
            display:flex; flex-direction:column; align-items:center;
            padding:50px 0 24px; transition:all 0.5s;
        }
        .search-section.compact { padding:20px 0 20px; }
        .search-wrapper {
            position:relative; width:100%; max-width:720px;
        }
        .search-input-row {
            display:flex; align-items:center; gap:0;
            background:rgba(30,41,59,0.9); border:1px solid rgba(56,189,248,0.2);
            border-radius:16px; overflow:hidden;
            box-shadow:0 0 40px rgba(56,189,248,0.06), inset 0 1px 0 rgba(255,255,255,0.03);
            transition:all 0.3s;
        }
        .search-input-row:focus-within {
            border-color:rgba(56,189,248,0.5);
            box-shadow:0 0 60px rgba(56,189,248,0.12), 0 0 0 3px rgba(56,189,248,0.05);
        }
        .search-input-row .icon-wrap {
            display:flex; align-items:center; justify-content:center;
            width:56px; color:#38bdf8; font-size:20px; flex-shrink:0;
        }
        .search-input-row input {
            flex:1; padding:18px 0; border:none; outline:none;
            background:transparent; color:#e2e8f0; font-size:17px;
            font-family:inherit; caret-color:#38bdf8;
        }
        .search-input-row input::placeholder { color:#475569; }
        .search-input-row button {
            padding:14px 28px; margin:6px; border:none; border-radius:10px;
            background:linear-gradient(135deg, #38bdf8, #818cf8);
            color:#fff; font-size:15px; font-weight:700; cursor:pointer;
            display:flex; align-items:center; gap:8px; transition:all 0.3s;
            white-space:nowrap;
        }
        .search-input-row button:hover { box-shadow:0 0 30px rgba(56,189,248,0.3); }
        .search-input-row button:disabled { opacity:0.4; cursor:not-allowed; }

        .search-hint {
            margin-top:14px; font-size:12px; color:#475569; display:flex; gap:20px;
        }
        .search-hint span {
            cursor:pointer; padding:4px 12px; border-radius:20px;
            background:rgba(56,189,248,0.06); border:1px solid rgba(56,189,248,0.1);
            transition:all 0.2s;
        }
        .search-hint span:hover { background:rgba(56,189,248,0.12); color:#94a3b8; }

        /* 采集源面板 */
        .config-panel {
            background:rgba(15,23,36,0.7); border:1px solid rgba(56,189,248,0.1);
            border-radius:16px; padding:20px 24px; margin:0 auto; max-width:720px;
            backdrop-filter:blur(8px);
        }
        .config-panel .panel-title {
            font-size:13px; font-weight:700; color:#94a3b8; text-transform:uppercase;
            letter-spacing:2px; margin-bottom:14px;
            display:flex; align-items:center; gap:8px;
        }
        .config-panel .panel-title i { color:#38bdf8; font-size:14px; }

        /* 采集源开关 */
        .source-toggles {
            display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;
        }
        .source-chip {
            display:flex; align-items:center; gap:8px;
            padding:8px 16px; border-radius:22px; cursor:pointer;
            background:rgba(30,41,59,0.8); border:1px solid rgba(71,85,105,0.3);
            font-size:12px; font-weight:600; color:#94a3b8;
            transition:all 0.25s; user-select:none;
        }
        .source-chip:hover { border-color:rgba(56,189,248,0.3); color:#cbd5e1; }
        .source-chip.active {
            background:rgba(56,189,248,0.1); border-color:rgba(56,189,248,0.4);
            color:#38bdf8; box-shadow:0 0 16px rgba(56,189,248,0.1);
        }
        .source-chip .chip-dot {
            width:8px; height:8px; border-radius:50%; background:currentColor;
            transition:all 0.3s;
        }
        .source-chip.active .chip-dot {
            box-shadow:0 0 8px currentColor;
        }

        /* 参数配置 */
        .param-row {
            display:flex; gap:16px; align-items:flex-end;
        }
        .param-group {
            display:flex; flex-direction:column; gap:4px;
        }
        .param-group label {
            font-size:11px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:1px;
        }
        .param-group input, .param-group select {
            width:90px; padding:8px 12px; border-radius:8px;
            border:1px solid rgba(71,85,105,0.3); background:rgba(30,41,59,0.8);
            color:#e2e8f0; font-size:13px; font-family:inherit; outline:none;
            transition:border-color 0.2s;
        }
        .param-group input:focus, .param-group select:focus {
            border-color:rgba(56,189,248,0.5);
        }
        .param-hint {
            font-size:11px; color:#475569; margin-top:4px;
        }

        /* 结果统计栏 */
        .results-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding:16px 0 12px; width:100%; max-width:960px; margin:0 auto;
        }
        .results-count {
            font-size:13px; color:#94a3b8; font-weight:600;
        }
        .results-actions {
            display:flex; gap:8px;
        }
        .btn-action {
            display:flex; align-items:center; gap:6px;
            padding:8px 18px; border-radius:8px; border:1px solid rgba(56,189,248,0.2);
            background:rgba(56,189,248,0.06); color:#38bdf8;
            font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s;
        }
        .btn-action:hover { background:rgba(56,189,248,0.14); }
        .btn-action.primary {
            background:linear-gradient(135deg, #38bdf8, #818cf8);
            border:none; color:#fff;
        }
        .btn-action.primary:hover { box-shadow:0 0 20px rgba(56,189,248,0.25); }
        .btn-action.primary:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }

        /* 结果网格 3列 */
        .results-grid {
            display:grid; grid-template-columns:repeat(3, 1fr);
            gap:16px; width:100%; max-width:960px; margin:0 auto; padding-bottom:40px;
        }
        .result-card {
            background:rgba(15,23,36,0.8); border:1px solid rgba(51,65,85,0.3);
            border-radius:14px; padding:18px; cursor:pointer;
            transition:all 0.3s; position:relative;
            min-height:180px; min-width:0; overflow:hidden;
        }
        .result-card:hover {
            border-color:rgba(56,189,248,0.3);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            transform:translateY(-2px);
        }
        .result-card.selected {
            border-color:rgba(56,189,248,0.6);
            background:rgba(56,189,248,0.05);
            box-shadow:0 0 20px rgba(56,189,248,0.1);
        }
        .result-card .card-check {
            position:absolute; top:10px; right:10px;
            width:22px; height:22px; border-radius:6px;
            border:2px solid rgba(71,85,105,0.5); display:flex;
            align-items:center; justify-content:center;
            color:transparent; font-size:11px; transition:all 0.2s;
        }
        .result-card.selected .card-check {
            background:#38bdf8; border-color:#38bdf8; color:#fff;
        }
        .result-card .card-source {
            font-size:10px; font-weight:700; color:#38bdf8;
            text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;
            padding-right:28px; /* 给右上角check留空间 */
        }
        .result-card .card-title {
            font-size:14px; font-weight:700; color:#e2e8f0;
            line-height:1.5; margin-bottom:8px;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
            overflow:hidden; word-break:break-all;
        }
        .result-card .card-snippet {
            font-size:12px; color:#64748b; line-height:1.55;
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
            overflow:hidden; margin-bottom:10px; word-break:break-all;
        }
        .result-card .card-url {
            font-size:10px; color:#475569;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }

        /* 加载动画 */
        .loading-section {
            display:flex; flex-direction:column; align-items:center;
            padding:40px; color:#475569; font-size:14px; gap:12px;
        }
        .loading-spinner {
            width:36px; height:36px; border:3px solid rgba(56,189,248,0.15);
            border-top-color:#38bdf8; border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* 进度条 */
        .progress-section {
            max-width:720px; margin:0 auto 20px;
        }
        .progress-item {
            display:flex; align-items:center; gap:10px;
            padding:8px 14px; margin-bottom:6px;
            background:rgba(15,23,36,0.6); border-radius:8px;
            border:1px solid rgba(51,65,85,0.2);
            font-size:12px; color:#94a3b8;
        }
        .progress-item .prog-icon { color:#38bdf8; font-size:14px; width:18px; text-align:center; }
        .progress-item .prog-name { flex:1; font-weight:600; }
        .progress-item .prog-url { color:#475569; font-size:11px; max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .progress-item.done .prog-icon { color:#22c55e; }

        /* 空状态 */
        .empty-results {
            text-align:center; padding:60px 20px; color:#475569;
        }
        .empty-results i {
            font-size:48px; display:block; margin-bottom:16px;
            background:linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            opacity:0.3;
        }
        .empty-results p { font-size:15px; }

        /* 响应式 */
        @media (max-width:900px) { .results-grid { grid-template-columns:repeat(2, 1fr); } }
        @media (max-width:600px) { .results-grid { grid-template-columns:1fr; } .param-row { flex-wrap:wrap; } }
    </style>
</head>
<body>
<div class="page-bg">
    <div class="grid-overlay"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="brand"><i class="fas fa-radar"></i> IOIQ 智能瞭望采集</div>
        <div class="nav-links">
            <a href="/admin/index"><i class="fas fa-tachometer-alt"></i>控制台</a>
            <a href="/admin/watch-sources"><i class="fas fa-cog"></i>数据源管理</a>
            <a href="/admin/watch-collect" class="active"><i class="fas fa-satellite-dish"></i>开始采集</a>
        </div>
    </div>

    <!-- 主体滚动区 -->
    <div class="main-scroll" id="mainScroll">
        <!-- 搜索区域 -->
        <div class="search-section" id="searchSection">
            <div class="search-wrapper">
                <div class="search-input-row">
                    <span class="icon-wrap"><i class="fas fa-search"></i></span>
                    <input type="text" id="keywordInput" placeholder="输入采集关键词... 如：西华师范大学"
                           onkeydown="if(event.key==='Enter')startCollect()" autofocus>
                    <button id="collectBtn" onclick="startCollect()">
                        <i class="fas fa-play"></i>开始采集
                    </button>
                </div>
            </div>
            <div class="search-hint" id="searchHints">
                <span onclick="document.getElementById('keywordInput').value='西华师范大学';startCollect()">西华师范大学</span>
                <span onclick="document.getElementById('keywordInput').value='人工智能';startCollect()">人工智能</span>
                <span onclick="document.getElementById('keywordInput').value='科技新闻';startCollect()">科技新闻</span>
            </div>
        </div>

        <!-- 采集源配置面板 -->
        <div class="config-panel" id="configPanel">
            <div class="panel-title"><i class="fas fa-toggle-on"></i>采集源开关</div>
            <div class="source-toggles" id="sourceToggles">
                <div style="color:#475569;font-size:12px;padding:4px 0;">加载中...</div>
            </div>

            <div class="panel-title" style="margin-top:8px;"><i class="fas fa-sliders-h"></i>采集参数</div>
            <div class="param-row">
                <div class="param-group">
                    <label>采集页数</label>
                    <input type="number" id="pagesInput" value="1" min="1" max="20">
                    <span class="param-hint">每源采集页数</span>
                </div>
                <div class="param-group">
                    <label>分页步进 (pn)</label>
                    <input type="number" id="pnStepInput" value="10" min="1" max="100">
                    <span class="param-hint">pn=0,10,20...</span>
                </div>
                <div class="param-group" style="flex:1;">
                    <label>预览</label>
                    <input type="text" id="urlPreview" readonly style="width:100%;font-size:11px;color:#475569;font-family:'SF Mono',monospace;"
                           value="https://www.baidu.com/s?...&word={关键词}&pn=0">
                </div>
            </div>
        </div>

        <!-- 进度显示 -->
        <div class="progress-section" id="progressSection" style="display:none;"></div>

        <!-- 结果区域 -->
        <div class="results-bar" id="resultsBar" style="display:none;">
            <div class="results-count" id="resultsCount">0 条结果</div>
            <div class="results-actions">
                <button class="btn-action" onclick="toggleSelectAll()" id="selectAllBtn">
                    <i class="fas fa-check-square"></i>全选
                </button>
                <button class="btn-action primary" onclick="saveSelected()" id="saveBtn" disabled>
                    <i class="fas fa-save"></i>保存选中 (<span id="saveCount">0</span>)
                </button>
            </div>
        </div>

        <!-- 采集结果网格 -->
        <div class="results-grid" id="resultsGrid"></div>

        <!-- 空状态 -->
        <div class="empty-results" id="emptyState">
            <i class="fas fa-satellite-dish"></i>
            <p>输入关键词，选择采集源，开始智能瞭望采集</p>
        </div>
    </div>
</div>

<script src="/static/zui/zui.js"></script>
<script>
// ====== 全局状态 ======
let allResults = [];        // 临时结果（未保存）
let selectedIds = new Set();
let isCollecting = false;
let sources = [];

// ====== 初始化：加载采集源 ======
(async function init() {
    try {
        const resp = await fetch('/admin/watch-collect/sources');
        sources = await resp.json();
        renderSourceToggles();
    } catch(e) { console.error('加载采集源失败', e); }
})();

function renderSourceToggles() {
    const el = document.getElementById('sourceToggles');
    if (!sources.length) {
        el.innerHTML = '<div style="color:#475569;font-size:12px;">暂无可用采集源</div>';
        return;
    }
    el.innerHTML = sources.map(s =>
        `<div class="source-chip active" data-sid="${s.id}" onclick="toggleSource(this)">
            <span class="chip-dot"></span>${s.name}
        </div>`
    ).join('');
}

function toggleSource(chip) {
    chip.classList.toggle('active');
    updateUrlPreview();
}

function getActiveSourceIds() {
    return [...document.querySelectorAll('.source-chip.active')].map(c => +c.dataset.sid);
}

// ====== URL 预览联动 ======
document.getElementById('pagesInput').addEventListener('input', updateUrlPreview);
document.getElementById('pnStepInput').addEventListener('input', updateUrlPreview);
document.getElementById('keywordInput').addEventListener('input', updateUrlPreview);

function updateUrlPreview() {
    const keyword = document.getElementById('keywordInput').value || '{关键词}';
    const pnStep = document.getElementById('pnStepInput').value || '10';
    const activeIds = getActiveSourceIds();
    const src = sources.find(s => s.id === activeIds[0]);
    if (src && src.url_template) {
        let url = src.url_template.replace('{关键词}', keyword);
        url = url.replace('{pn}', '0');
        document.getElementById('urlPreview').value = url;
    } else {
        document.getElementById('urlPreview').value = '请选择采集源';
    }
}

// ====== 开始采集 ======
async function startCollect() {
    if (isCollecting) return;
    const keyword = document.getElementById('keywordInput').value.trim();
    if (!keyword) { alert('请输入关键词'); return; }

    const activeIds = getActiveSourceIds();
    if (!activeIds.length) { alert('请至少选择一个采集源'); return; }

    isCollecting = true;
    allResults = [];
    selectedIds.clear();
    document.getElementById('collectBtn').disabled = true;
    document.getElementById('collectBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i>采集中...';
    document.getElementById('searchSection').classList.add('compact');
    document.getElementById('searchHints').style.display = 'none';
    document.getElementById('resultsGrid').innerHTML = '';
    document.getElementById('resultsBar').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('progressSection').style.display = 'block';
    document.getElementById('progressSection').innerHTML = '';
    updateSaveBtn();

    const pages = parseInt(document.getElementById('pagesInput').value) || 1;
    const pnStep = parseInt(document.getElementById('pnStepInput').value) || 10;

    try {
        const resp = await fetch('/admin/watch-collect/fetch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ keyword, source_ids: activeIds, pages, pn_step: pnStep })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const data = JSON.parse(line.slice(6));
                    handleSSEMessage(data);
                } catch(e) {}
            }
        }
    } catch(e) {
        addProgress({ source: '错误', page: 1, total_pages:1, url: e.message }, true);
    } finally {
        finishCollect();
    }
}

function handleSSEMessage(data) {
    switch(data.type) {
        case 'progress':
            addProgress(data, false);
            break;
        case 'result':
            allResults.push(data);
            renderResults();
            break;
        case 'source_done':
            markProgressDone(data.source_id);
            break;
        case 'error':
            addProgress({ source: data.source, page: 1, total_pages:1, url: data.message }, true);
            break;
        case 'all_done':
            break;
    }
}

function addProgress(info, isError) {
    const el = document.getElementById('progressSection');
    const div = document.createElement('div');
    div.className = 'progress-item' + (isError ? ' done' : '');
    div.dataset.source = info.source || '';
    div.innerHTML = `<span class="prog-icon"><i class="fas ${isError?'fa-exclamation-triangle':'fa-circle-notch fa-spin'}"></i></span>
        <span class="prog-name">${info.source||''}</span>
        <span class="prog-url">${(info.url||'').substring(0,100)}</span>`;
    el.appendChild(div);
    document.getElementById('mainScroll').scrollTop = document.getElementById('mainScroll').scrollHeight;
}

function markProgressDone(sourceName) {
    document.querySelectorAll('.progress-item').forEach(p => {
        if (p.dataset.source === sourceName) {
            p.classList.add('done');
            p.querySelector('.prog-icon').innerHTML = '<i class="fas fa-check-circle"></i>';
        }
    });
}

function finishCollect() {
    isCollecting = false;
    document.getElementById('collectBtn').disabled = false;
    document.getElementById('collectBtn').innerHTML = '<i class="fas fa-play"></i>开始采集';
    document.getElementById('progressSection').style.display = 'none';
    if (!allResults.length) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').innerHTML = '<i class="fas fa-search"></i><p>未采集到结果，请尝试其他关键词</p>';
    }
}

// ====== 渲染结果网格 ======
function renderResults() {
    const grid = document.getElementById('resultsGrid');
    const bar = document.getElementById('resultsBar');
    bar.style.display = 'flex';
    document.getElementById('resultsCount').textContent = allResults.length + ' 条结果';
    document.getElementById('emptyState').style.display = 'none';

    grid.innerHTML = allResults.map((r, i) => `
        <div class="result-card ${selectedIds.has(i) ? 'selected' : ''}" onclick="toggleCard(${i})" data-idx="${i}">
            <div class="card-check"><i class="fas fa-check"></i></div>
            <div class="card-source">${r.source_name||''}</div>
            <div class="card-title">${escapeHtml(r.title||'无标题')}</div>
            <div class="card-snippet">${escapeHtml(r.snippet||'')}</div>
            <div class="card-url">${escapeHtml(r.url||'').substring(0,80)}</div>
        </div>
    `).join('');

    updateSaveBtn();
}

function toggleCard(idx) {
    if (selectedIds.has(idx)) {
        selectedIds.delete(idx);
    } else {
        selectedIds.add(idx);
    }
    // 更新卡片视觉
    const card = document.querySelector(`.result-card[data-idx="${idx}"]`);
    if (card) card.classList.toggle('selected', selectedIds.has(idx));
    updateSaveBtn();
}

function toggleSelectAll() {
    const cards = document.querySelectorAll('.result-card');
    if (selectedIds.size === allResults.length) {
        selectedIds.clear();
        cards.forEach(c => c.classList.remove('selected'));
        document.getElementById('selectAllBtn').innerHTML = '<i class="fas fa-check-square"></i>全选';
    } else {
        allResults.forEach((_, i) => selectedIds.add(i));
        cards.forEach(c => c.classList.add('selected'));
        document.getElementById('selectAllBtn').innerHTML = '<i class="fas fa-square"></i>取消全选';
    }
    updateSaveBtn();
}

function updateSaveBtn() {
    const cnt = selectedIds.size;
    document.getElementById('saveCount').textContent = cnt;
    document.getElementById('saveBtn').disabled = cnt === 0;
    document.getElementById('selectAllBtn').innerHTML = selectedIds.size === allResults.length && allResults.length > 0
        ? '<i class="fas fa-square"></i>取消全选'
        : '<i class="fas fa-check-square"></i>全选';
}

// ====== 保存选中结果 ======
async function saveSelected() {
    if (!selectedIds.size) return;
    const toSave = [...selectedIds].map(i => allResults[i]);
    try {
        const resp = await fetch('/admin/watch-collect/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ results: toSave })
        });
        const data = await resp.json();
        alert(`已成功保存 ${data.saved} 条采集结果到数据库！`);
    } catch(e) {
        alert('保存失败: ' + e.message);
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
</body>
</html>
