<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数智大屏 - IOIQ System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
    --bg-primary:#080c18;
    --bg-card:rgba(16,24,48,0.85);
    --border-card:rgba(99,130,255,0.15);
    --text-primary:#e8edff;
    --text-secondary:#8896c4;
    --accent-cyan:#00e5ff;
    --accent-purple:#9d6eff;
    --accent-blue:#448aff;
    --accent-green:#00e676;
    --accent-orange:#ff9100;
    --accent-red:#ff5252;
    --glow-cyan:0 0 20px rgba(0,229,255,0.2);
    --glow-purple:0 0 20px rgba(157,110,255,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:var(--bg-primary);
    color:var(--text-primary);
    font-family:'Segoe UI','Microsoft YaHei',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
}
body::before{
    content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at 20% 20%,rgba(68,138,255,0.06) 0%,transparent 60%),
               radial-gradient(ellipse at 80% 80%,rgba(157,110,255,0.05) 0%,transparent 60%);
    pointer-events:none;z-index:0;
}
.grid-bg{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(99,130,255,0.04) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(99,130,255,0.04) 1px,transparent 1px);
    background-size:60px 60px;
}

/* Top Bar */
.topbar{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 28px;
    background:linear-gradient(180deg,rgba(16,24,48,0.95),rgba(8,12,24,0));
    border-bottom:1px solid var(--border-card);
}
.topbar .logo{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:700;}
.topbar .logo i{color:var(--accent-cyan);font-size:28px;}
.topbar .actions{display:flex;gap:10px;align-items:center;}
.btn{
    padding:7px 16px;border-radius:6px;border:1px solid rgba(99,130,255,0.3);
    background:rgba(16,24,48,0.8);color:var(--text-secondary);
    font-size:13px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:rgba(99,130,255,0.15);border-color:rgba(99,130,255,0.5);color:var(--text-primary);}
.btn.active{background:rgba(0,229,255,0.15);border-color:var(--accent-cyan);color:var(--accent-cyan);}
.btn.fullscreen{background:rgba(157,110,255,0.15);border-color:rgba(157,110,255,0.4);color:var(--accent-purple);}
.time-display{font-size:28px;font-weight:300;letter-spacing:2px;color:var(--accent-cyan);font-family:'Consolas',monospace;}

/* Main Grid */
.main-grid{
    position:relative;z-index:5;
    display:grid;grid-template-columns:repeat(4,1fr);
    grid-auto-rows:minmax(140px,auto);
    gap:14px;padding:0 24px 24px;
}
.card{
    background:var(--bg-card);
    border:1px solid var(--border-card);
    border-radius:12px;padding:18px;position:relative;overflow:hidden;
    transition:all 0.3s;backdrop-filter:blur(10px);
}
.card:hover{border-color:rgba(99,130,255,0.3);box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);
    opacity:0;transition:opacity 0.3s;
}
.card:hover::before{opacity:1;}
.card-title{
    font-size:13px;font-weight:600;color:var(--text-secondary);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;
    display:flex;align-items:center;gap:8px;
}
.card-title i{font-size:15px;}

/* Metric Cards */
.metric-row{grid-column:span 4;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.metric-card{
    background:var(--bg-card);border:1px solid var(--border-card);
    border-radius:12px;padding:18px 20px;text-align:center;position:relative;overflow:hidden;
    backdrop-filter:blur(10px);transition:all 0.3s;
}
.metric-card:hover{transform:translateY(-2px);border-color:rgba(99,130,255,0.4);}
.metric-card .m-value{font-size:32px;font-weight:700;margin:4px 0;}
.metric-card .m-label{font-size:12px;color:var(--text-secondary);letter-spacing:0.5px;}
.metric-card .m-icon{font-size:22px;margin-bottom:4px;opacity:0.8;}
.metric-card.cyan .m-value,.metric-card.cyan .m-icon{color:var(--accent-cyan);}
.metric-card.purple .m-value,.metric-card.purple .m-icon{color:var(--accent-purple);}
.metric-card.blue .m-value,.metric-card.blue .m-icon{color:var(--accent-blue);}
.metric-card.green .m-value,.metric-card.green .m-icon{color:var(--accent-green);}
.metric-card.orange .m-value,.metric-card.orange .m-icon{color:var(--accent-orange);}

/* Chart Cards */
.chart-card{grid-column:span 2;min-height:280px;}
.chart-card.wide{grid-column:span 4;}
.chart-card canvas{max-height:240px;}

/* Live Feed */
.live-feed{grid-column:span 1;grid-row:span 2;max-height:420px;overflow:hidden;}
.feed-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(99,130,255,0.06);font-size:12px;}
.feed-item .dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.feed-item .dot.user{background:var(--accent-blue);}
.feed-item .dot.ai{background:var(--accent-purple);}
.feed-item .feed-body{flex:1;}
.feed-item .feed-user{color:var(--accent-blue);font-weight:600;margin-right:4px;}
.feed-item .feed-time{color:var(--text-secondary);font-size:11px;display:block;margin-top:2px;}

/* Alerts */
.alerts-panel{grid-column:span 1;grid-row:span 2;max-height:420px;overflow:hidden;}
.alert-item{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid rgba(99,130,255,0.06);font-size:12px;}
.alert-item .al-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.alert-item.warning .al-icon{background:rgba(255,145,0,0.15);color:var(--accent-orange);}
.alert-item.info .al-icon{background:rgba(68,138,255,0.15);color:var(--accent-blue);}
.alert-item .al-body{flex:1;}
.alert-item .al-title{font-weight:600;margin-bottom:2px;}
.alert-item .al-time{color:var(--text-secondary);font-size:11px;}

/* Update indicator */
.update-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent-green);margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.update-text{font-size:11px;color:var(--text-secondary);}

/* Fullscreen */
body.fullscreen .topbar{padding:8px 20px;}
body.fullscreen .main-grid{padding:0 16px 16px;gap:10px;}
body.fullscreen .topbar .logo{font-size:16px;}

/* Layout customization - drag handles */
.card[draggable]{cursor:grab;}
.card[draggable]:active{cursor:grabbing;opacity:0.7;}

/* Responsive */
@media(max-width:1200px){.main-grid{grid-template-columns:repeat(2,1fr)}.metric-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.main-grid{grid-template-columns:1fr}.metric-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- Top Bar -->
<div class="topbar">
    <div class="logo">
        <i class="fas fa-eye"></i> IOIQ 数智大屏
        <span style="font-size:11px;color:var(--text-secondary);font-weight:400;margin-left:8px;">| Data Intelligence Dashboard</span>
    </div>
    <div class="time-display" id="clock">--:--:--</div>
    <div class="actions">
        <span style="font-size:12px;color:var(--text-secondary);">
            <span class="update-dot"></span>实时
            <span class="update-text" id="lastUpdate" style="margin-left:4px;">--</span>
        </span>
        <button class="btn active" data-tpl="1" onclick="switchTemplate('1')"><i class="fas fa-th-large"></i> 模板A</button>
        <button class="btn" data-tpl="2" onclick="switchTemplate('2')"><i class="fas fa-th"></i> 模板B</button>
        <button class="btn" data-tpl="3" onclick="switchTemplate('3')"><i class="fas fa-columns"></i> 模板C</button>
        <button class="btn fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i> 全屏</button>
        <a href="/admin/index" class="btn"><i class="fas fa-arrow-left"></i> 返回后台</a>
    </div>
</div>

<!-- Main Grid -->
<div class="main-grid" id="dashboardGrid">
    <!-- Metric Row -->
    <div class="metric-row" data-gid="metrics">
        <div class="metric-card cyan">
            <div class="m-icon"><i class="fas fa-users"></i></div>
            <div class="m-value" data-key="users">0</div>
            <div class="m-label">总用户数</div>
        </div>
        <div class="metric-card purple">
            <div class="m-icon"><i class="fas fa-comments"></i></div>
            <div class="m-value" data-key="conversations">0</div>
            <div class="m-label">总会话数</div>
        </div>
        <div class="metric-card blue">
            <div class="m-icon"><i class="fas fa-envelope"></i></div>
            <div class="m-value" data-key="messages">0</div>
            <div class="m-label">总消息数</div>
        </div>
        <div class="metric-card green">
            <div class="m-icon"><i class="fas fa-coins"></i></div>
            <div class="m-value" data-key="tokens">0</div>
            <div class="m-label">Token 消耗</div>
        </div>
        <div class="metric-card orange">
            <div class="m-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="m-value" data-key="flagged">0</div>
            <div class="m-label">预警消息</div>
        </div>
    </div>

    <!-- Message Trend Chart -->
    <div class="card chart-card wide" data-gid="trend">
        <div class="card-title"><i class="fas fa-chart-line"></i> 消息趋势（近7天）</div>
        <canvas id="chartTrend"></canvas>
    </div>

    <!-- Role Distribution -->
    <div class="card chart-card" data-gid="role">
        <div class="card-title"><i class="fas fa-chart-pie"></i> 消息角色分布</div>
        <canvas id="chartRole"></canvas>
    </div>

    <!-- Model Usage -->
    <div class="card chart-card" data-gid="model">
        <div class="card-title"><i class="fas fa-microchip"></i> 模型调用分布</div>
        <canvas id="chartModel"></canvas>
    </div>

    <!-- Hourly Activity -->
    <div class="card chart-card wide" data-gid="hourly">
        <div class="card-title"><i class="fas fa-clock"></i> 24小时活跃度</div>
        <canvas id="chartHourly"></canvas>
    </div>

    <!-- Live Feed -->
    <div class="card live-feed" data-gid="live">
        <div class="card-title"><i class="fas fa-bolt"></i> 实时对话流</div>
        <div id="liveFeed"></div>
    </div>

    <!-- Risk Alerts -->
    <div class="card alerts-panel" data-gid="alerts">
        <div class="card-title"><i class="fas fa-shield-alt"></i> 风险预警</div>
        <div id="alertsPanel"></div>
    </div>

    <!-- Skill Calls -->
    <div class="card chart-card" data-gid="skill">
        <div class="card-title"><i class="fas fa-puzzle-piece"></i> 技能调用排行</div>
        <canvas id="chartSkill"></canvas>
    </div>

    <!-- System Status -->
    <div class="card chart-card" data-gid="system">
        <div class="card-title"><i class="fas fa-server"></i> 系统资源概览</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px;">
            <div style="text-align:center;">
                <div style="font-size:28px;font-weight:700;color:var(--accent-purple);" id="sysEmployees">0</div>
                <div style="font-size:12px;color:var(--text-secondary);">数字员工</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:28px;font-weight:700;color:var(--accent-cyan);" id="sysSkills">0</div>
                <div style="font-size:12px;color:var(--text-secondary);">AI技能</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:28px;font-weight:700;color:var(--accent-blue);" id="sysApis">0</div>
                <div style="font-size:12px;color:var(--text-secondary);">API接口</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:28px;font-weight:700;color:var(--accent-green);" id="sysWatch">0</div>
                <div style="font-size:12px;color:var(--text-secondary);">瞭望来源</div>
            </div>
        </div>
    </div>
</div>

<script>
let charts={};
let refreshTimer=null;
let currentTemplate='{{ template }}';

// Clock
function updateClock(){
    const now=new Date();
    document.getElementById('clock').textContent=
        now.toLocaleTimeString('zh-CN',{hour12:false});
}
setInterval(updateClock,1000);updateClock();

// Template switching
function switchTemplate(tpl){
    currentTemplate=tpl;
    document.querySelectorAll('[data-tpl]').forEach(b=>b.classList.toggle('active',b.dataset.tpl===tpl));
    const grid=document.getElementById('dashboardGrid');
    // Template A: default 4-col
    if(tpl==='1'){
        grid.style.gridTemplateColumns='repeat(4,1fr)';
        document.querySelector('.metric-row').style.gridTemplateColumns='repeat(5,1fr)';
    }
    // Template B: 3-col compact
    else if(tpl==='2'){
        grid.style.gridTemplateColumns='repeat(3,1fr)';
        document.querySelector('.metric-row').style.gridTemplateColumns='repeat(5,1fr)';
    }
    // Template C: focus mode - 2-col with larger charts
    else if(tpl==='3'){
        grid.style.gridTemplateColumns='repeat(2,1fr)';
        document.querySelector('.metric-row').style.gridTemplateColumns='repeat(5,1fr)';
    }
    // Re-render charts after layout change
    setTimeout(refreshCharts,300);
}

// Fullscreen
function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
        document.body.classList.add('fullscreen');
    }else{
        document.exitFullscreen();
        document.body.classList.remove('fullscreen');
    }
}
document.addEventListener('fullscreenchange',()=>{
    document.body.classList.toggle('fullscreen',!!document.fullscreenElement);
});

// Drag-drop layout
let draggedEl=null;
document.querySelectorAll('.card,.metric-row').forEach(el=>{
    if(el.classList.contains('metric-row'))return;
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',function(e){
        draggedEl=this;
        this.style.opacity='0.5';
        e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',function(e){
        this.style.opacity='';
        draggedEl=null;
    });
    el.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';});
    el.addEventListener('drop',function(e){
        e.preventDefault();
        if(draggedEl!==this&&draggedEl){
            const grid=document.getElementById('dashboardGrid');
            const allCards=[...grid.querySelectorAll('.card,.metric-row')];
            const idxA=allCards.indexOf(draggedEl);
            const idxB=allCards.indexOf(this);
            if(idxA>=0&&idxB>=0&&idxA!==idxB){
                if(idxA<idxB){
                    grid.insertBefore(draggedEl,this.nextSibling);
                }else{
                    grid.insertBefore(draggedEl,this);
                }
            }
        }
    });
});

// Charts
function createCharts(){
    const darkOpts={
        color:'#8896c4',
        borderColor:'rgba(99,130,255,0.2)',
        grid:{color:'rgba(99,130,255,0.08)'}
    };

    // Trend Line
    charts.trend=new Chart(document.getElementById('chartTrend'),{
        type:'line',
        data:{labels:[],datasets:[{label:'消息数',data:[],borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.08)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#00e5ff'}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:darkOpts,grid:darkOpts.grid},y:{ticks:darkOpts,grid:darkOpts.grid}}}
    });
    // Role Pie
    charts.role=new Chart(document.getElementById('chartRole'),{
        type:'doughnut',
        data:{labels:[],datasets:[{data:[],backgroundColor:['#448aff','#9d6eff'],borderColor:'transparent'}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8896c4',padding:16}}}}
    });
    // Model Bar
    charts.model=new Chart(document.getElementById('chartModel'),{
        type:'bar',
        data:{labels:[],datasets:[{label:'调用次数',data:[],backgroundColor:['#9d6eff','#448aff','#00e5ff','#00e676','#ff9100','#ff5252','#e040fb','#64ffda','#ffd740','#40c4ff']}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:darkOpts,grid:darkOpts.grid},y:{ticks:darkOpts,grid:darkOpts.grid}}}
    });
    // Hourly
    charts.hourly=new Chart(document.getElementById('chartHourly'),{
        type:'bar',
        data:{labels:[],datasets:[{label:'活跃度',data:[],backgroundColor:'rgba(0,229,255,0.5)',borderRadius:3}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{...darkOpts,maxTicksLimit:12},grid:darkOpts.grid},y:{ticks:darkOpts,grid:darkOpts.grid}}}
    });
    // Skill Bar
    charts.skill=new Chart(document.getElementById('chartSkill'),{
        type:'bar',
        data:{labels:[],datasets:[{label:'调用次数',data:[],backgroundColor:'rgba(157,110,255,0.6)',borderRadius:3}]},
        options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:darkOpts,grid:darkOpts.grid},y:{ticks:darkOpts,grid:darkOpts.grid}}}
    });
}

function refreshCharts(){
    Object.values(charts).forEach(c=>c.resize());
}

// Fetch data
async function fetchData(){
    try{
        const resp=await fetch('/admin/dashboard/data');
        const data=await resp.json();
        updateMetrics(data.metrics);
        updateTrend(data.trend);
        updateRole(data.distribution);
        updateModel(data.model_usage);
        updateHourly(data.hourly);
        updateSkill(data.skill_calls);
        updateLive(data.live);
        updateAlerts(data.alerts);
        document.getElementById('sysEmployees').textContent=data.metrics.employees||0;
        document.getElementById('sysSkills').textContent=data.metrics.skills||0;
        document.getElementById('sysApis').textContent=data.metrics.apis||0;
        document.getElementById('sysWatch').textContent=data.metrics.watch_sources||0;
        document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('zh-CN');
    }catch(e){console.error('Fetch error:',e);}
}

function updateMetrics(m){
    if(!m)return;
    document.querySelector('[data-key="users"]').textContent=m.users||0;
    document.querySelector('[data-key="conversations"]').textContent=m.conversations||0;
    document.querySelector('[data-key="messages"]').textContent=m.messages||0;
    document.querySelector('[data-key="tokens"]').textContent=m.tokens||0;
    document.querySelector('[data-key="flagged"]').textContent=m.flagged||0;
}
function updateTrend(d){
    if(!d||!d.length)return;
    charts.trend.data.labels=d.map(i=>i.date);
    charts.trend.data.datasets[0].data=d.map(i=>i.count);
    charts.trend.update();
}
function updateRole(d){
    if(!d||!d.length)return;
    charts.role.data.labels=d.map(i=>i.name);
    charts.role.data.datasets[0].data=d.map(i=>i.value);
    charts.role.update();
}
function updateModel(d){
    if(!d||!d.length)return;
    charts.model.data.labels=d.map(i=>i.name);
    charts.model.data.datasets[0].data=d.map(i=>i.count);
    charts.model.update();
}
function updateHourly(d){
    if(!d||!d.length)return;
    charts.hourly.data.labels=d.map(i=>i.hour);
    charts.hourly.data.datasets[0].data=d.map(i=>i.count);
    charts.hourly.update();
}
function updateSkill(d){
    if(!d||!d.length)return;
    charts.skill.data.labels=d.map(i=>i.name);
    charts.skill.data.datasets[0].data=d.map(i=>i.count);
    charts.skill.update();
}
function updateLive(d){
    if(!d||!d.length){document.getElementById('liveFeed').innerHTML=
        '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;">暂无实时消息</div>';return;}
    document.getElementById('liveFeed').innerHTML=d.map(m=>
        `<div class="feed-item">
            <div class="dot ${m.role}"></div>
            <div class="feed-body">
                <span class="feed-user">${escHtml(m.username)}</span>
                ${escHtml(m.content)}
                <span class="feed-time">${m.time}</span>
            </div>
        </div>`
    ).join('');
}
function updateAlerts(d){
    if(!d||!d.length){document.getElementById('alertsPanel').innerHTML=
        '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:12px;"><i class="fas fa-check-circle" style="color:var(--accent-green);display:block;font-size:24px;margin-bottom:8px;"></i>无预警信息</div>';return;}
    document.getElementById('alertsPanel').innerHTML=d.map(a=>
        `<div class="alert-item ${a.level}">
            <div class="al-icon"><i class="fas ${a.level==='warning'?'fa-exclamation-triangle':'fa-info-circle'}"></i></div>
            <div class="al-body">
                <div class="al-title">${escHtml(a.title)}</div>
                <div>${escHtml(a.detail)}</div>
                <div class="al-time">${a.time}</div>
            </div>
        </div>`
    ).join('');
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Init
createCharts();
fetchData();
refreshTimer=setInterval(fetchData,30000);

// Initial template
switchTemplate(currentTemplate);
</script>
</body>
</html>
