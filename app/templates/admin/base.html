<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% end %} - IOIQ System</title>
    <link rel="stylesheet" href="/static/zui/zui.css">
    <link rel="stylesheet" href="/static/fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        /* 整体布局 */
        .admin-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }
        /* 顶部导航栏 */
        .admin-header {
            height: 56px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .header-logo {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
        }
        .header-title {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            font-size: 14px;
        }
        .user-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }
        .btn-logout {
            padding: 6px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            color: #64748b;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .btn-logout:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* 主体区域：左侧菜单 + 右侧工作区 */
        .admin-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 左侧菜单 */
        .admin-sidebar {
            width: 220px;
            background: #f8fafc;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            flex-shrink: 0;
            padding: 12px 0;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0 10px;
        }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }
        .sidebar-menu li a:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .sidebar-menu li a.active {
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            color: #fff;
        }
        .sidebar-menu li a i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }
        .menu-section-title {
            padding: 12px 20px 6px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 右侧工作区 */
        .admin-main {
            flex: 1;
            overflow-y: auto;
            background: #f1f5f9;
            padding: 24px;
        }
        .page-header {
            margin-bottom: 20px;
        }
        .page-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }
        .page-header p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
    {% block head %}{% end %}
</head>
<body>
<div class="admin-layout">
    <!-- 顶部导航栏 -->
    <div class="admin-header">
        <div class="header-left">
            <a href="/admin/index" class="header-brand">
                <div class="header-logo"><i class="fas fa-eye"></i></div>
                <span class="header-title">IOIQ 智能瞭望与问数系统</span>
            </a>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <span>{{ username }}</span>
            </div>
            <form action="/admin/logout" method="post" style="display:inline;">
                <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt me-1"></i>退出登录</button>
            </form>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="admin-body">
        <!-- 左侧菜单 -->
        <div class="admin-sidebar">
            <ul class="sidebar-menu">
                <li><a href="/admin/index"{% if current_page == 'dashboard' %} class="active"{% end %}><i class="fas fa-tachometer-alt"></i>控制台</a></li>
                <li><a href="/admin/users"{% if current_page == 'users' %} class="active"{% end %}><i class="fas fa-users"></i>用户管理</a></li>
                <li><a href="/admin/functions"{% if current_page == 'functions' %} class="active"{% end %}><i class="fas fa-list-alt"></i>功能管理</a></li>
                <li><a href="/admin/roles"{% if current_page == 'roles' %} class="active"{% end %}><i class="fas fa-user-shield"></i>权限管理</a></li>
                <li><a href="/admin/models"{% if current_page == 'models' %} class="active"{% end %}><i class="fas fa-microchip"></i>模型引擎</a></li>
                <li><a href="/admin/watch-sources"{% if current_page == 'watch' %} class="active"{% end %}><i class="fas fa-eye"></i>瞭望管理</a></li>
                <li><a href="/admin/watch-collect"{% if current_page == 'watch_collect' %} class="active"{% end %}><i class="fas fa-satellite-dish"></i>瞭望采集</a></li>
                <li><a href="/admin/data-warehouse"{% if current_page == 'warehouse' %} class="active"{% end %}><i class="fas fa-database"></i>数据仓库</a></li>
                <li><a href="/admin/deep-collect"{% if current_page == 'deep' %} class="active"{% end %}><i class="fas fa-microscope"></i>深度采集</a></li>
                <li><a href="/admin/api-interfaces"{% if current_page == 'api' %} class="active"{% end %}><i class="fas fa-plug"></i>接口管理</a></li>
                <li><a href="/admin/employees"{% if current_page == 'employee' %} class="active"{% end %}><i class="fas fa-robot"></i>数字员工</a></li>
                <li><a href="/admin/skills"{% if current_page == 'skills' %} class="active"{% end %}><i class="fas fa-tools"></i>技能管理</a></li>
                <li><a href="/admin/sessions"{% if current_page == 'sessions' %} class="active"{% end %}><i class="fas fa-history"></i>会话管理</a></li>
                <li><a href="/admin/chats"{% if current_page == 'chats' %} class="active"{% end %}><i class="fas fa-comments"></i>对话管理</a></li>
                <li><a href="/admin/dashboard"{% if current_page == 'dashboard_screen' %} class="active"{% end %}><i class="fas fa-chart-bar"></i>数智大屏</a></li>
                <li><a href="/admin/system"{% if current_page == 'system' %} class="active"{% end %}><i class="fas fa-cog"></i>系统设置</a></li>
            </ul>
        </div>

        <!-- 右侧工作区 -->
        <div class="admin-main">
            {% block content %}
            {% end %}
        </div>
    </div>
</div>

<script src="/static/zui/zui.js"></script>
{% block script %}{% end %}
</body>
</html>
